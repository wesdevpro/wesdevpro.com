backend:
  name: github
  repo: wesdevpro/wesdevpro
  branch: main

media_folder: static/img
public_folder: /img

collections:
  - name: 'blog'
    label: 'Blog'
    folder: '/packages/client/content/articles'
    format: 'frontmatter'
    create: true
    slug: '{{title}}-{{slug}}'
    editor:
      preview: false
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Pexel Image', name: 'img', widget: 'string' }
      - { label: 'Publish Date', name: 'date', widget: 'date' }
      - { label: 'Category', name: 'category', widget: 'string' }
      - { label: 'Description', name: 'clentcher', widget: 'string' }
      - { label: 'Body', name: 'body', widget: 'markdown' }